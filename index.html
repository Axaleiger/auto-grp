<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Выбор сервиса</title>
<style>
:root {
  --bg: #080b10;
  --card: #121824;
  --border: #2a3548;
  --text: #f0f4fa;
  --muted: #8b9cb3;
  --accent: #5b8def;
  --teal: #2dd4bf;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  color: var(--text);
  background:
    radial-gradient(900px 500px at 15% -10%, rgba(45,212,191,.16), transparent 55%),
    radial-gradient(700px 420px at 95% 10%, rgba(91,141,239,.12), transparent 50%),
    var(--bg);
  display: grid;
  place-items: center;
  padding: max(20px, var(--safe-t)) max(16px, var(--safe-r)) max(20px, var(--safe-b)) max(16px, var(--safe-l));
  -webkit-tap-highlight-color: transparent;
}
.wrap { width: min(720px, 100%); }
.hdr { text-align: center; margin-bottom: 22px; }
h1 { font-size: 1.25rem; font-weight: 650; letter-spacing: -.02em; }
.sub { margin-top: 6px; color: var(--muted); font-size: .85rem; line-height: 1.45; }
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; }
  h1 { font-size: 1.1rem; }
  .card { min-height: 140px; padding: 18px 16px; }
}
.card {
  display: flex; flex-direction: column; gap: 10px;
  padding: 20px 18px;
  border-radius: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  text-decoration: none; color: inherit;
  transition: border-color .15s, transform .15s, background .15s;
  min-height: 168px;
}
.card:hover, .card:active {
  border-color: var(--teal);
  background: #162033;
}
.card.second:hover, .card.second:active { border-color: var(--accent); }
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: .68rem; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase; color: var(--muted);
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--teal);
}
.card.second .dot { background: var(--accent); }
.card h2 { font-size: 1.15rem; font-weight: 650; }
.card p { color: var(--muted); font-size: .8rem; line-height: 1.45; flex: 1; }
.card .go {
  font-size: .78rem; font-weight: 600; color: var(--teal);
}
.card.second .go { color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="hdr">
      <h1>Выберите сервис</h1>
      <p class="sub">Данные месторождения общие</p>
    </div>
    <div class="grid">
      <a class="card" href="compensation_dashboard.html">
        <div class="badge"><span class="dot"></span>Этап 1</div>
        <h2>Закачка</h2>
        <p>Компенсация закачки по блокам (коридор 90–120%), светофор скважин, рекомендации.</p>
        <span class="go">Открыть →</span>
      </a>
      <a class="card second" href="auto_grp_analyzer.html">
        <div class="badge"><span class="dot"></span>Этап 2</div>
        <h2>Факторы обводнённости</h2>
        <p>Трещины, прорывы, карта давлений, диагностика факторов обводнения.</p>
        <span class="go">Открыть →</span>
      </a>
    </div>
  </div>
</body>
</html>
