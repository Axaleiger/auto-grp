<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Каталог ПО ЦДП — Портфель решений</title>
<style>
/* Палитра как в Axaleiger/syundyukov-alexander-cda (tokens.css / demo sidebar) */
:root {
  --stand-deep: #004077;
  --stand-mid: #004596;
  --stand-bright: #0070ba;
  --stand-cyan: #2fb4e9;
  --stand-accent: #e65907;
  --bg: #f5f5f7;
  --panel: #ffffff;
  --line: #e2e8f0;
  --ink: #2c3e50;
  --muted: #5a6c7d;
  --title: #1e3a5f;
  --ok: #16a34a;
  --warn: #ea580c;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  padding: var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);
  -webkit-tap-highlight-color: transparent;
}
.app {
  display: grid;
  grid-template-columns: 64px 1fr;
  min-height: 100vh;
  min-height: 100dvh;
}
.sidebar {
  background: var(--stand-deep);
  border-right: 1px solid rgba(0, 112, 186, .5);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 10px 6px;
}
.side-btn {
  width: 48px; height: 48px; border: 0; border-radius: 12px;
  background: transparent; color: rgba(255,255,255,.9); cursor: pointer;
  display: grid; place-items: center; transition: background .2s;
}
.side-btn:hover { background: rgba(0, 112, 186, .38); }
.side-btn.on {
  background: var(--stand-mid);
  box-shadow: inset 0 0 0 1px rgba(47, 180, 233, .45);
}
.side-btn svg { width: 20px; height: 20px; }
.main { min-width: 0; display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 12px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}
.topbar h1 {
  font-size: clamp(.9rem, 1.5vw, 1.05rem);
  font-weight: 650; color: var(--title); letter-spacing: -.01em; line-height: 1.35;
}
.user {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  color: var(--muted); font-size: .84rem; font-weight: 600;
}
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--stand-cyan), var(--stand-bright));
  color: #fff; display: grid; place-items: center; font-size: .68rem; font-weight: 700;
}
.filters {
  display: flex; flex-wrap: wrap; align-items: end; gap: 10px 12px;
  margin: 14px 16px 0; padding: 12px 14px;
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
}
.filter { display: flex; flex-direction: column; gap: 4px; min-width: 140px; flex: 1; }
.filter label { font-size: .68rem; color: var(--muted); font-weight: 600; }
.filter select {
  height: 36px; border: 1px solid #d1d5db; border-radius: 8px;
  background: #fff; color: var(--ink); padding: 0 10px; font: inherit; font-size: 14px;
}
.btn-apply {
  height: 36px; border: 0; border-radius: 8px; padding: 0 18px;
  background: var(--stand-bright); color: #fff; font: inherit; font-size: .84rem; font-weight: 650;
  cursor: pointer; white-space: nowrap;
}
.btn-apply:hover { background: var(--stand-mid); }
.filters-toggle { display: none; }
.content { padding: 16px 16px 28px; }
.section { margin-bottom: 22px; }
.section h2 {
  font-size: 1rem; font-weight: 700; margin: 0 0 12px; color: var(--title);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 12px;
}
.card {
  position: relative;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  min-height: 176px;
  padding: 12px;
  display: flex; flex-direction: column; gap: 6px;
  box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
  transition: box-shadow .15s, border-color .15s;
}
.card:hover {
  border-color: rgba(0, 112, 186, .35);
  box-shadow: 0 10px 28px rgba(0, 64, 119, .08);
}
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.badges { display: flex; flex-wrap: wrap; gap: 4px; }
.badge {
  font-size: .58rem; font-weight: 800; letter-spacing: .04em;
  text-transform: uppercase; padding: 2px 5px; border-radius: 4px;
}
.badge.data { color: var(--stand-accent); background: #fff4ed; }
.badge.calc { color: var(--stand-bright); background: #e8f4fc; }
.badge.result { color: var(--ok); background: #eefbf2; }
.badge.warn { color: #b45309; background: #fffbeb; }
.info {
  width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(47, 180, 233, .7);
  color: var(--stand-bright); background: #eef9ff; font-size: .68rem; font-weight: 800;
  display: grid; place-items: center; cursor: help; flex-shrink: 0; position: relative;
}
.changed { font-size: .68rem; color: var(--muted); }
.card-title {
  flex: 1; display: grid; place-items: center; text-align: center;
  font-size: clamp(.95rem, 1.4vw, 1.12rem); font-weight: 800;
  letter-spacing: .02em; text-transform: uppercase; line-height: 1.2;
  color: #111827; padding: 10px 4px;
}
.card-foot {
  display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: auto;
}
.owners { display: flex; align-items: center; }
.owners span {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff;
  margin-left: -6px; display: grid; place-items: center;
  font-size: .55rem; font-weight: 800; color: #fff;
}
.owners span:first-child { margin-left: 0; }
.owners .a { background: var(--stand-cyan); }
.owners .b { background: var(--stand-mid); }
.go {
  border: 0; border-radius: 7px; padding: 7px 10px;
  background: #e8f4fc; color: var(--stand-bright);
  font: inherit; font-size: .72rem; font-weight: 700;
  text-decoration: none; white-space: nowrap; cursor: pointer;
}
.go:hover { background: #d7eefb; }
.tip {
  display: none; position: absolute; z-index: 20;
  max-width: min(280px, 72vw); padding: 10px 12px;
  background: #1a2332; color: #f9fafb; border-radius: 8px;
  font-size: .72rem; line-height: 1.45; font-weight: 500;
  box-shadow: 0 12px 30px rgba(0,0,0,.28);
  text-transform: none; letter-spacing: 0; text-align: left;
  pointer-events: none;
}
.info:hover .tip, .info:focus .tip, .info.open .tip { display: block; }
.info .tip { right: 0; top: calc(100% + 8px); }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: sticky; top: 0; z-index: 30;
    flex-direction: row; justify-content: space-around;
    padding: 8px; height: auto;
  }
  .side-btn { width: 42px; height: 42px; }
  .topbar { padding: 12px 14px; flex-wrap: wrap; }
  .topbar h1 { font-size: .86rem; }
  .filters { margin: 10px 10px 0; }
  .filters.collapsed .filter { display: none; }
  .filters-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    height: 36px; padding: 0 12px; border: 1px solid #d1d5db; border-radius: 8px;
    background: #fff; font: inherit; font-size: .8rem; font-weight: 650; cursor: pointer;
  }
  .content { padding: 12px 10px 24px; }
  .grid { grid-template-columns: 1fr; }
  .card { min-height: 156px; }
  .go { min-height: 40px; display: inline-flex; align-items: center; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" aria-label="Навигация">
    <button class="side-btn on" title="Каталог" aria-current="page" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </button>
    <button class="side-btn" title="Аналитика" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V5M4 19h16"/><path d="M8 16v-5M12 16V8M16 16v-3"/></svg>
    </button>
    <button class="side-btn" title="Скважины" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v18M8 7h8M9 11h6M10 15h4"/><circle cx="12" cy="20" r="1.5"/></svg>
    </button>
    <button class="side-btn" title="Данные" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><ellipse cx="12" cy="6" rx="7" ry="3"/><path d="M5 6v6c0 1.7 3.1 3 7 3s7-1.3 7-3V6"/><path d="M5 12v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"/></svg>
    </button>
  </aside>

  <div class="main">
    <header class="topbar">
      <h1>Каталог ПО ЦДП — Портфель решений цифрового двойника промысла</h1>
      <div class="user">
        <span>Смирнова ВН</span>
        <div class="avatar" aria-hidden="true">СВ</div>
      </div>
    </header>

    <form class="filters collapsed" id="filters" onsubmit="return false;">
      <button type="button" class="filters-toggle" id="filtersToggle">Фильтры</button>
      <div class="filter">
        <label for="fDo">ДО</label>
        <select id="fDo"><option>Все</option><option>Хантос</option><option>Мессояха</option></select>
      </div>
      <div class="filter">
        <label for="fField">Месторождение</label>
        <select id="fField"><option>Все</option><option selected>Романовское</option></select>
      </div>
      <div class="filter">
        <label for="fLayer">Пласт</label>
        <select id="fLayer"><option>Все</option><option>БС9_1</option><option>БС10</option></select>
      </div>
      <div class="filter">
        <label for="fArea">Участок</label>
        <select id="fArea"><option>Все</option></select>
      </div>
      <button type="button" class="btn-apply" id="btnApply">Применить</button>
    </form>

    <div class="content">
      <section class="section">
        <h2>Основные</h2>
        <div class="grid" id="gridMain"></div>
      </section>
      <section class="section">
        <h2>Дополнительные</h2>
        <div class="grid" id="gridExtra"></div>
      </section>
    </div>
  </div>
</div>

<script>
var TOOLS = [
  {
    id: 'inj',
    group: 'main',
    title: 'Закачка',
    href: 'compensation_dashboard.html',
    changed: '23.07.2026',
    badges: [
      { t: 'данные', c: 'result' },
      { t: 'расчёт', c: 'calc' },
      { t: 'результат', c: 'result' }
    ],
    tip: 'Компенсация закачки по блокам (коридор 90–120%), светофор нагнетательных скважин и рекомендации по регулированию.',
    owners: ['a', 'b']
  },
  {
    id: 'wc',
    group: 'main',
    title: 'Факторы обводнённости',
    href: 'auto_grp_analyzer.html',
    changed: '23.07.2026',
    badges: [
      { t: 'данные', c: 'result' },
      { t: 'расчёт', c: 'calc' },
      { t: 'результат', c: 'data' }
    ],
    tip: 'Карта давлений, трещины авто-ГРП, прорывы и диагностика факторов обводнения по добывающим скважинам.',
    owners: ['a', 'b']
  },
  {
    id: 'startup',
    group: 'main',
    title: 'Запускные параметры',
    href: 'startup_wells.html',
    changed: '24.07.2026',
    badges: [
      { t: 'данные', c: 'data' },
      { t: 'расчёт', c: 'calc' },
      { t: 'результат', c: 'result' }
    ],
    tip: 'Оценка дебита жидкости и нефти для ННС/ГС с учётом ГРП, режимов и факторного анализа план/факт.',
    owners: ['b', 'a']
  },
  {
    id: 'ppd',
    group: 'extra',
    title: 'Оптимизация системы ППД',
    href: 'compensation_dashboard.html',
    changed: '23.07.2026',
    badges: [
      { t: 'данные', c: 'result' },
      { t: 'расчёт', c: 'calc' },
      { t: 'результат', c: 'result' }
    ],
    tip: 'Связанный сценарий регулирования закачки — открывает дашборд компенсации по блокам.',
    owners: ['a', 'b']
  }
];

function esc(s) {
  return String(s).replace(/[&<>"']/g, function(ch) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
  });
}

function renderCard(t) {
  var badges = t.badges.map(function(b) {
    return '<span class="badge ' + b.c + '">' + esc(b.t) + '</span>';
  }).join('');
  var owners = (t.owners || []).map(function(o) {
    return '<span class="' + o + '" title="Автор сценария"></span>';
  }).join('');
  return (
    '<article class="card" data-id="' + esc(t.id) + '">' +
      '<div class="card-top">' +
        '<div class="badges">' + badges + '</div>' +
        '<button type="button" class="info" aria-label="Описание">i' +
          '<span class="tip">' + esc(t.tip) + '</span>' +
        '</button>' +
      '</div>' +
      '<div class="changed">изменён: ' + esc(t.changed) + '</div>' +
      '<div class="card-title">' + esc(t.title) + '</div>' +
      '<div class="card-foot">' +
        '<div class="owners">' + owners + '</div>' +
        '<a class="go" href="' + esc(t.href) + '">Перейти к сценарию →</a>' +
      '</div>' +
    '</article>'
  );
}

function paint() {
  var main = TOOLS.filter(function(t) { return t.group === 'main'; });
  var extra = TOOLS.filter(function(t) { return t.group === 'extra'; });
  document.getElementById('gridMain').innerHTML = main.map(renderCard).join('');
  document.getElementById('gridExtra').innerHTML = extra.map(renderCard).join('');
  bindInfo();
}

function bindInfo() {
  document.querySelectorAll('.info').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      var open = btn.classList.contains('open');
      document.querySelectorAll('.info.open').forEach(function(b) { b.classList.remove('open'); });
      if (!open) btn.classList.add('open');
    });
  });
}

document.addEventListener('click', function() {
  document.querySelectorAll('.info.open').forEach(function(b) { b.classList.remove('open'); });
});

document.getElementById('btnApply').addEventListener('click', paint);
document.getElementById('filtersToggle').addEventListener('click', function() {
  document.getElementById('filters').classList.toggle('collapsed');
});
if (!window.matchMedia('(max-width:900px)').matches) {
  document.getElementById('filters').classList.remove('collapsed');
}
paint();
</script>
</body>
</html>
